<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD AMELLLLL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a1a, #4b0082, #1a1a1a);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Background Animasi Hati / Tengkorak Kecil khas Kuromi */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .particle {
            position: absolute;
            display: block;
            pointer-events: none;
            width: 20px;
            height: 20px;
            background-color: #ff007f;
            clip-path: div;
            opacity: 0.6;
            animation: float 6s linear infinite;
        }

        /* Kartu Ucapan */
        .card {
            background: rgba(25, 25, 25, 0.85);
            border: 4px solid #ff007f;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.5), inset 0 0 15px rgba(75, 0, 130, 0.5);
            width: 85%;
            max-width: 450px;
            z-index: 10;
            backdrop-filter: blur(5px);
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Dekorasi Telinga Kuromi (Simulasi Siluet Atas) */
        .kuromi-ears {
            display: flex;
            justify-content: space-between;
            margin-top: -65px;
            margin-bottom: 20px;
        }

        .ear {
            width: 50px;
            height: 50px;
            background-color: #1a1a1a;
            border: 3px solid #ff007f;
            border-radius: 50% 50% 0 50%;
            transform: rotate(-45deg);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        .ear.right {
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
        }

        .ear-badge {
            width: 15px;
            height: 15px;
            background-color: #ff007f;
            border-radius: 50%;
            margin: 15px auto;
            position: relative;
        }

        /* Foto/Avatar */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #9400d3;
            object-fit: cover;
            background-color: #333;
        }

        .skull-badge {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff007f;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid #fff;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff007f;
            font-size: 2.2rem;
            margin: 10px 0;
            text-shadow: 2px 2px 0px #4b0082, 0 0 10px rgba(255, 0, 127, 0.8);
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .wishes {
            font-style: italic;
            color: #da70d6;
            margin-top: 15px;
            border-top: 1px dashed #4b0082;
            padding-top: 15px;
        }

        /* Tombol Interaktif */
        .btn {
            background: linear-gradient(45deg, #ff007f, #9400d3);
            border: none;
            padding: 12px 25px;
            color: white;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: 0.3s transform, 0.3s box-shadow;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Animasi Keyframes */
        @keyframes popIn {
            to { transform: scale(1); }
        }

        @keyframes float {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="card">
        <!-- Dekorasi Telinga ala Kuromi -->
        <div class="kuromi-ears">
            <div class="ear left"><div class="ear-badge"></div></div>
            <div class="ear right"><div class="ear-badge"></div></div>
        </div>

        <div class="avatar-container">
            <!-- Ganti URL gambar di bawah ini dengan foto temanmu atau gambar Kuromi -->
            <img class="avatar" src="amel.jpeg" alt="Kuromi Birthday">
            <div class="skull-badge">💀</div>
        </div>

        <h1>Happy Birthday Amell!</h1>
        <p>lu gak lupa ama gw kan wkwkwk</p>
        
        <p class="wishes">
            "Semoga sehat selalu woy, tambah pinter, DLL(gatau mau nambah apalagi)"
        </p>

        <button class="btn" onclick="makeConfetti()">coba klik deh</button>
    </div>

    <script>
        // Membuat efek partikel hati/bintang yang melayang di background
        const particlesContainer = document.getElementById('particles');
        const colors = ['#ff007f', '#9400d3', '#ffffff', '#000000'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Atur posisi acak
            particle.style.left = Math.random() * 100 + 'vw';
            // Atur ukuran acak
            const size = Math.random() * 15 + 10 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            
            // Bentuk hati menggunakan clip-path sederhana
            particle.style.clipPath = "path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z')";
            particle.style.transformOrigin = "center";
            
            // Warna acak khas Kuromi
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Durasi animasi acak
            particle.style.animationDuration = Math.random() * 3 + 4 + 's'; 
            
            particlesContainer.appendChild(particle);

            // Hapus elemen setelah animasi selesai agar tidak membebani memori
            setTimeout(() => {
                particle.remove();
            }, 7000);
        }

        // Jalankan partikel background secara otomatis
        setInterval(createParticle, 300);

        // Fungsi tombol interaktif untuk meledakkan "konfeti" hati
        function makeConfetti() {
            for (let i = 0; i < 30; i++) {
                setTimeout(createParticle, i * 20);
            }
            alert("BTW jangan lupa traktir gw ya, kirim ke alamat 84 ajah🥱");
        }
    </script>
</body>
</html>
